# Worktrunk project config — shared by all contributors
# See: https://worktrunk.dev/reference/hook

# Validate quality gates before merging back to main
# Runs: frontend typecheck + lint, then backend tests
pre-merge = "just ci"

[[pre-start]]
frontend = "cd frontend && npm install --legacy-peer-deps"

[[pre-start]]
backend = "cd backend && uv sync"
