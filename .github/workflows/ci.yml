name: CI

on:
  pull_request:
    branches: [main]

# NOTE: deliberately NO top-level `paths:` filter here.
#
# A workflow skipped by a path filter never posts its checks at all, so any
# required context it owns sits at "Expected — waiting for status" forever and
# the PR can never merge. A JOB skipped by an `if:` condition posts SUCCESS.
# That asymmetry is why the gating below lives on the jobs, not on the trigger.
# https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks

# Supersede in-flight runs for the same PR. Before this, a single branch could
# rack up ten runs where only the last one mattered.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      tooling: ${{ steps.filter.outputs.tooling }}

    # Only what `gh pr diff` needs. Stated explicitly so the job does not
    # inherit — or silently lose — its capability from a repository-wide
    # default that someone can flip in Settings.
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v5

      - id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # `set +e` so a failure here cannot skip the jobs below: a skipped
          # job reports SUCCESS to a required check, so failing closed would
          # wave the PR through with nothing verified. `gh` returning nothing
          # reaches the classifier as empty stdin, which it treats as
          # "run everything". `CI gate` catches this case too.
          set +e
          files=$(gh pr diff "$PR" --repo "$REPO" --name-only)
          printf '%s\n' "$files" | scripts/ci-changed-areas.sh | tee -a "$GITHUB_OUTPUT"

  frontend:
    name: Frontend (typecheck + lint + format + test)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v5
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

  backend:
    name: Backend (lint + format + tests)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Test
        run: uv run pytest

  tooling:
    name: Repo tooling (guardrail hooks + CI filter)
    needs: changes
    if: needs.changes.outputs.tooling == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Deliberately no uv/pnpm setup: these guard the agent's own tooling and
      # the CI filter itself, and must run on a bare checkout with only system
      # python3. Do not add a dependency to either test — needing one is a sign
      # the thing under test belongs in a script, not embedded somewhere that
      # requires a parser to reach.
      - name: Test guardrail hooks
        run: python3 .claude/hooks/test_hooks.py

      - name: Test CI changed-area filter
        run: python3 scripts/test-ci-changed-areas.py

  # E2E. Shares the `changes` classifier with everything else rather than
  # carrying its own `paths:` list — two encodings of one rule drift, and the
  # previous pair already had (SHARED covered all of .github/workflows/, the
  # paths list only covered playwright.yml).
  #
  # Gated on `frontend` because these specs never touch a real backend: no
  # FastAPI process or Postgres runs here, and tests/fixtures.ts mocks every
  # backend route with frozen TypeScript literals. A Python change cannot fail
  # them. The gap that leaves is tracked in JAV-48, and needs a contract test
  # rather than a wider trigger.
  playwright:
    name: Playwright Tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v5
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  # The single required status check. Every job above is free to be renamed,
  # split, or skipped without touching the repository ruleset.
  #
  # `if: always()` is what makes this correct rather than decorative — without
  # it, an upstream failure would skip this job, and a skipped required check
  # reports SUCCESS. With it, `changes` blowing up fails the gate instead of
  # silently waving the PR through.
  #
  # `playwright` is deliberately ABSENT from `needs`. E2E is advisory today —
  # a PR can merge with it red. Adding it here makes it blocking, which is a
  # real policy change and should be made on purpose, not inherited from the
  # refactor that moved it into this file. Flakiness is being assessed in
  # JAV-49; promote it after that settles, not before.
  ci-gate:
    name: CI gate
    needs: [changes, frontend, backend, tooling]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Verify no upstream job failed
        run: |
          set -uo pipefail
          results='${{ join(needs.*.result, ' ') }}'
          echo "Upstream results: $results"
          for r in $results; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::An upstream CI job reported '$r'"; exit 1 ;;
            esac
          done
          echo "All upstream jobs succeeded or were skipped."
