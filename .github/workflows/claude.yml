name: Claude Code

# Make each run identifiable by the PR/issue it belongs to.
#
# Runs triggered by `issue_comment` are always attributed to the DEFAULT branch —
# an issue comment carries no ref, so GitHub reads the workflow from `main` and
# reports `headBranch: main` even when the comment is on a PR whose head is a
# feature branch. (That is a security property, not a quirk: it stops a PR author
# from editing this file in their branch and running it with repository secrets.)
#
# Consequence: `gh run list --branch <feature-branch>` can never find a review run.
# This run-name restores a PR-scoped handle, so runs can be located with:
#   gh run list --workflow=claude.yml --json databaseId,displayTitle
#
# NOTE: the value must stay quoted. Unquoted, YAML treats the " #" before the
# expression as the start of a comment and the name silently truncates to
# "Claude —", losing the number this exists to carry.
run-name: "Claude — #${{ github.event.issue.number || github.event.pull_request.number }}"

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'

