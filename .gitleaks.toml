# .gitleaks.toml
# Docs: https://github.com/gitleaks/gitleaks#configuration

[extend]
# Use gitleaks' default rules as a base — they cover the common formats
# (AWS, GitHub, Slack, Stripe, Gemini/Google API keys, JWTs, private keys, etc.)
useDefault = true

[allowlist]
description = "CarroQueSí allowlist"
paths = [
  # Add paths here as real false positives show up, e.g.:
  # '''backend/tests/fixtures/.*''',
]

