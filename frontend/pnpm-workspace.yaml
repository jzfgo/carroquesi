allowBuilds:
  '@firebase/util': true
  esbuild: true
  protobufjs: true
  re2: true
  sharp: true
minimumReleaseAge: 10080

# Security overrides: these are transitively pinned by dev tooling
# (firebase-tools, @vite-pwa/assets-generator) below the patched versions.
overrides:
  sharp: ^0.35.0
  '@hono/node-server': ^2.0.0
  uuid@<11.1.1: ^11.1.1
