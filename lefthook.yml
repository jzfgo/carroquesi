# lefthook.yml
#
# Install:  brew install lefthook   (or see https://lefthook.dev/installation/)
# Wire up:  just setup              (unsets core.hooksPath, runs `lefthook install`)
# Docs:     https://lefthook.dev/configuration/
#
# NOTE ON `root:` — this scopes both glob-matching and the command's working
# directory to that subfolder, and rewrites {staged_files} relative to it.
# That's the documented behavior as of writing; if your installed lefthook
# version behaves differently, run `lefthook run pre-commit -v` once and
# check the paths it actually passes.

pre-commit:
  parallel: true
  commands:
    backend-lint:
      root: "backend/"
      glob: "**/*.py"
      run: uv run ruff check --fix {staged_files} && uv run ruff format {staged_files}
      stage_fixed: true

    frontend-lint:
      root: "frontend/"
      glob: "**/*.{ts,tsx}"
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true

    frontend-stylelint:
      root: "frontend/"
      glob: "**/*.css"
      run: pnpm exec stylelint --fix {staged_files}
      stage_fixed: true

    # Never commit platform-narrowed native bindings to pnpm-lock.yaml.
    #
    # The failure this catches is a lockfile that resolved optional deps for the
    # committer's platform only, so installs break everywhere else. It is NOT
    # "a native binding appeared" — packages like sharp legitimately ship a full
    # per-platform matrix, and every version bump necessarily adds new entries.
    # So we judge completeness, not presence: for each native-binding family
    # added, the staged lockfile must name that family at that version for more
    # than one OS.
    lockfile-guard:
      glob: "frontend/pnpm-lock.yaml"
      run: |
        # Arch segments may be hyphenated (linux-x64-gnu, linux-arm-musleabihf),
        # so arch is [a-z0-9-]+. Longer OS names precede their prefixes in the
        # alternation so linuxmusl is not swallowed by linux.
        OS='(darwin|linuxmusl|linux|win32)'
        staged=$(git show :frontend/pnpm-lock.yaml)
        added=$(git diff --cached -- frontend/pnpm-lock.yaml \
          | grep -E "^\+" \
          | grep -oE "[@a-z0-9/.-]+-${OS}-[a-z0-9-]+@[0-9][0-9.]*" \
          | sort -u)
        fail=0
        for pkg in $added; do
          fam=$(printf '%s' "$pkg" | sed -E "s/-${OS}-[a-z0-9-]+@.*//")
          ver=${pkg##*@}
          oses=$(printf '%s' "$staged" \
            | grep -oE "$(printf '%s' "$fam" | sed 's/[.[\*^$]/\\&/g')-${OS}-[a-z0-9-]+@${ver}" \
            | sed -E "s/.*-${OS}-[a-z0-9-]+@.*/\1/" \
            | sort -u | wc -l | tr -d ' ')
          if [ "$oses" -lt 2 ]; then
            echo "✗ ${fam}@${ver} is platform-narrowed (only $oses OS in the lockfile)."
            fail=1
          fi
        done
        if [ "$fail" -eq 1 ]; then
          echo "  Re-run 'pnpm install' on a clean checkout before committing, per AGENTS.md."
          exit 1
        fi

    secrets:
      run: |
        if ! command -v gitleaks >/dev/null 2>&1; then
          echo "⚠️  gitleaks not found — skipping secret scan (install: brew install gitleaks)"
          exit 0
        fi
        gitleaks git --staged --no-banner --redact

pre-push:
  commands:
    changelog:
      run: scripts/check-changelog.sh
